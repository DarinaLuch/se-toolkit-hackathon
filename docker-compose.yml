services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: newsdigest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/newsdigest
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:42005/v1}
      LLM_MODEL: ${LLM_MODEL:-coder-model}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net
    ports:
      - "3000:80"

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
